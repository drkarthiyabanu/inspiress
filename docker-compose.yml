services:
  web:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - db
    volumes:
      - .:/var/www/html
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: admin_edinz
      MYSQL_USER: admin_edinz
      MYSQL_PASSWORD: Ke2FES@e4evxIUT
    volumes:
      - ./init-extra-db.sql:/docker-entrypoint-initdb.d/01-init-extra-db.sql
      - db_data:/var/lib/mysql

volumes:
  db_data:  